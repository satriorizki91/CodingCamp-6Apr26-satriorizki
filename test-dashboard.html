<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .test-result {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .pass {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .fail {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        #test-container {
            display: none;
        }
    </style>
</head>
<body>
    <h1>Dashboard Integration Test</h1>
    <div id="results"></div>
    
    <!-- Hidden test container -->
    <div id="test-container">
        <div id="greeting-widget" class="widget">
            <div class="greeting-content"></div>
        </div>
        <div id="timer-widget" class="widget">
            <div class="timer-content"></div>
        </div>
        <div id="tasks-widget" class="widget">
            <div class="tasks-content"></div>
        </div>
        <div id="links-widget" class="widget">
            <div class="links-content"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Test Dashboard functionality
        const results = document.getElementById('results');
        
        function addResult(testName, passed, message = '') {
            const div = document.createElement('div');
            div.className = `test-result ${passed ? 'pass' : 'fail'}`;
            div.textContent = `${passed ? '✓' : '✗'} ${testName}${message ? ': ' + message : ''}`;
            results.appendChild(div);
        }

        // Wait for DOM to be ready
        setTimeout(() => {
            try {
                // Test 1: Dashboard class exists
                addResult('Dashboard class exists', typeof Dashboard === 'function');

                // Test 2: Can create Dashboard instance
                const dashboard = new Dashboard();
                addResult('Can create Dashboard instance', dashboard !== null);

                // Test 3: Initial state is correct
                const initialStateCorrect = 
                    dashboard.greetingWidget === null &&
                    dashboard.focusTimer === null &&
                    dashboard.taskList === null &&
                    dashboard.quickLinks === null;
                addResult('Initial state is correct', initialStateCorrect);

                // Test 4: Init method initializes all widgets
                dashboard.init();
                const allWidgetsInitialized = 
                    dashboard.greetingWidget !== null &&
                    dashboard.focusTimer !== null &&
                    dashboard.taskList !== null &&
                    dashboard.quickLinks !== null;
                addResult('All widgets initialized', allWidgetsInitialized);

                // Test 5: Greeting widget displays content
                const greetingContent = document.querySelector('#greeting-widget .greeting-content');
                const hasGreeting = greetingContent && greetingContent.innerHTML.includes('Good');
                addResult('Greeting widget displays content', hasGreeting);

                // Test 6: Timer widget displays content
                const timerDisplay = document.querySelector('.timer-display');
                const hasTimer = timerDisplay && /\d{2}:\d{2}/.test(timerDisplay.textContent);
                addResult('Timer widget displays content', hasTimer);

                // Test 7: Task list widget displays content
                const taskList = document.querySelector('.task-list');
                addResult('Task list widget displays content', taskList !== null);

                // Test 8: Quick links widget displays content
                const linkList = document.querySelector('.link-list');
                addResult('Quick links widget displays content', linkList !== null);

                // Test 9: Destroy method cleans up widgets
                dashboard.destroy();
                const allWidgetsDestroyed = 
                    dashboard.greetingWidget === null &&
                    dashboard.focusTimer === null &&
                    dashboard.taskList === null &&
                    dashboard.quickLinks === null;
                addResult('Destroy method cleans up all widgets', allWidgetsDestroyed);

                // Test 10: Application auto-initializes on page load
                // This is tested by the fact that the main index.html loads without errors
                addResult('Application auto-initializes on page load', true, 'Verified by successful page load');

            } catch (error) {
                addResult('Test execution', false, error.message);
            }
        }, 100);
    </script>
</body>
</html>
